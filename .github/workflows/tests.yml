name: Tests

on:
  push:
    branches:
      - master
      - v4.0
      - v5
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - master
      - v4.0
      - v5
    paths-ignore:
      - "**/*.md"
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
        redis:
          - tag: "rs-7.4.0-v1"
            version: "7.4"
          - tag: "8.2"
            version: "8.2"
          - tag: "8.4.0"
            version: "8.4"
          - tag: "unstable-24425681442-debian"
            version: "8.8"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
            node-version: ${{ matrix.node-version }}
            redis-tag: ${{ matrix.redis.tag }}
            redis-version: ${{ matrix.redis.version }}
            otel-authorization-token: ${{ secrets.SELF_CHECK_OTEL_AUTHORIZATION_TOKEN }}